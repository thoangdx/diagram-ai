version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dbdiagram
      POSTGRES_PASSWORD: dbdiagram
      POSTGRES_DB: dbdiagram
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgres://dbdiagram:dbdiagram@postgres:5432/dbdiagram
      PORT: 3001
    depends_on:
      - postgres

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
